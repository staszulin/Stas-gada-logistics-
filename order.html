<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1E40AF"/>
<title>Gada Group — הזמנה</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Tahoma,sans-serif;direction:rtl;background:#F1F5F9;min-height:100vh;padding:16px;}
.card{background:#fff;border-radius:16px;padding:24px;max-width:480px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.logo-icon{background:#1E40AF;border-radius:12px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
h1{font-size:20px;font-weight:800;color:#1E293B;}
h2{font-size:13px;color:#94A3B8;font-weight:400;margin-top:2px;}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;margin-top:16px;}
select,input{width:100%;padding:12px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:15px;outline:none;background:#FAFAFA;color:#1E293B;font-family:inherit;direction:rtl;}
select:focus,input:focus{border-color:#1D4ED8;background:#fff;}

.submit-btn{width:100%;padding:16px;background:#1D4ED8;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:24px;font-family:inherit;transition:all .15s;}
.submit-btn:active{transform:scale(.98);background:#1E40AF;}
.submit-btn:disabled{background:#94A3B8;cursor:not-allowed;}
.success{display:none;text-align:center;padding:32px 16px;}
.success-icon{font-size:60px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:800;color:#15803D;margin-bottom:8px;}
.success-sub{font-size:14px;color:#6B7280;}
.new-order-btn{margin-top:20px;padding:12px 24px;background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:10px;color:#15803D;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.branch-info{background:#F8FAFF;border:1.5px solid #DBEAFE;border-radius:10px;padding:12px 14px;margin-top:8px;}
.branch-name{font-size:16px;font-weight:700;color:#1E293B;}
.branch-addr{font-size:12px;color:#94A3B8;margin-top:2px;}
.chain-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px;}
.note-field{resize:none;height:80px;}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#CBD5E1;}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card" id="form-card">
  <div class="logo">
    <div class="logo-icon">🚛</div>
    <div>
      <h1>Gada Group</h1>
      <h2>טופס הזמנת משטחים</h2>
    </div>
  </div>

  <!-- Agent name -->
  <label>שם הסוכן *</label>
  <input type="text" id="agent-name" placeholder="שם מלא" autocomplete="name"/>

  <!-- Chain select -->
  <label>רשת *</label>
  <select id="chain-select" onchange="filterBranches()">
    <option value="">— בחר רשת —</option>
    <option>דן דיל</option>
    <option>זול סטוק</option>
    <option>בום</option>
    <option>מקס סטוק</option>
    <option>ביג סטוק</option>
    <option>סיטי מרקט</option>
    <option>הסטוק</option>
    <option>גמה דיל</option>
  </select>

  <!-- Branch select -->
  <label>סניף *</label>
  <select id="branch-select" onchange="showBranchInfo()" disabled>
    <option value="">— בחר סניף —</option>
  </select>
  <div class="branch-info" id="branch-info" style="display:none"></div>



  <!-- Note -->
  <label>הערה (אופציונלי)</label>
  <textarea class="note-field" id="note" placeholder="הערות מיוחדות להזמנה..."></textarea>

  <button class="submit-btn" id="submit-btn" onclick="submitOrder()">
    📦 שלח הזמנה
  </button>

  <div class="footer">© כל הזכויות שמורות לסטס זולין · Gada Group</div>
</div>

<!-- Success screen -->
<div class="card success" id="success-card">
  <div class="success-icon">✅</div>
  <div class="success-title">ההזמנה נשלחה!</div>
  <div class="success-sub" id="success-details"></div>
  <button class="new-order-btn" onclick="resetForm()">+ הזמנה חדשה</button>
  <div class="footer" style="margin-top:16px">© כל הזכויות שמורות לסטס זולין · Gada Group</div>
</div>

const qty = 1;

function filterBranches() {
  const chain = document.getElementById("chain-select").value;
  const sel = document.getElementById("branch-select");
  sel.innerHTML = '<option value="">— בחר סניף —</option>';
  if(!chain) { sel.disabled=true; return; }
  const filtered = BRANCHES.filter(b=>b.chain===chain);
  filtered.forEach(b=>{
    const o = document.createElement("option");
    o.value = b.id;
    o.textContent = b.city + " — " + b.address;
    sel.appendChild(o);
  });
  sel.disabled = false;
  document.getElementById("branch-info").style.display="none";
}

function showBranchInfo() {
  const id = parseInt(document.getElementById("branch-select").value);
  const info = document.getElementById("branch-info");
  if(!id) { info.style.display="none"; return; }
  const b = BRANCHES.find(x=>x.id===id);
  if(!b) return;
  const clr = CHAIN_COLORS[b.chain]||"#64748B";
  info.innerHTML = `
    <div class="branch-name">${b.city}</div>
    <div class="branch-addr">${b.address}</div>
    <span class="chain-badge" style="background:${clr}18;color:${clr};border:1px solid ${clr}30">${b.chain}</span>
  `;
  info.style.display="block";
}

async function submitOrder() {
  const agent = document.getElementById("agent-name").value.trim();
  const chain = document.getElementById("chain-select").value;
  const branchId = parseInt(document.getElementById("branch-select").value);
  const note = document.getElementById("note").value.trim();

  if(!agent) { alert("נא למלא שם סוכן"); document.getElementById("agent-name").focus(); return; }
  if(!chain) { alert("נא לבחור רשת"); return; }
  if(!branchId) { alert("נא לבחור סניף"); return; }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.innerHTML = 'שולח... <span class="loading-spinner"></span>';

  const branch = BRANCHES.find(b=>b.id===branchId);
  const today = new Date().toISOString().slice(0,10);
  const entry = { qty, date: today, agent, note };

  try {
    const res = await fetch(DB+"/orders/"+branchId+".json", {
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(entry)
    });
    if(!res.ok) throw new Error("שגיאת שרת");

    // Show success
    document.getElementById("form-card").style.display="none";
    document.getElementById("success-card").style.display="block";
    document.getElementById("success-details").innerHTML =
      `<strong>${branch.chain} — ${branch.city}</strong><br>
       ${qty} משטח${qty>1?"ים":""} · ${today.split("-").reverse().join("/")}<br>
       ${note ? "הערה: "+note : ""}<br><br>
       ההזמנה נכנסה למערכת ✅`;
  } catch(e) {
    alert("שגיאה בשליחה, נסה שוב");
    btn.disabled = false;
    btn.innerHTML = "📦 שלח הזמנה";
  }
}

function resetForm() {
  document.getElementById("agent-name").value="";
  document.getElementById("chain-select").value="";
  document.getElementById("branch-select").innerHTML='<option value="">— בחר סניף —</option>';
  document.getElementById("branch-select").disabled=true;
  document.getElementById("branch-info").style.display="none";
  document.getElementById("note").value="";
  document.getElementById("submit-btn").disabled=false;
  document.getElementById("submit-btn").innerHTML="📦 שלח הזמנה";
  document.getElementById("success-card").style.display="none";
  document.getElementById("form-card").style.display="block";
}

// Pre-fill from URL params (e.g. ?branch=302)
window.onload = () => {
  const params = new URLSearchParams(location.search);
  const bid = parseInt(params.get("branch"));
  if(bid) {
    const b = BRANCHES.find(x=>x.id===bid);
    if(b) {
      document.getElementById("chain-select").value = b.chain;
      filterBranches();
      document.getElementById("branch-select").value = bid;
      showBranchInfo();
    }
  }
};
</script>
