// ── Utils ──────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const todayDow=()=>new Date().getDay();
const daysSince=d=>d?Math.floor((Date.now()-new Date(d).getTime())/86400000):0;
const fmtDate=d=>{if(!d)return"";const[y,m,dd]=d.split("-");return`${dd}/${m}`;};

function loadState(){try{const r=localStorage.getItem("dlv_v9");if(r)return JSON.parse(r);}catch{}return null;}
function saveState(s){try{localStorage.setItem("dlv_v9",JSON.stringify(s));}catch{}}

// ── App State ──────────────────────────────
const saved=loadState();
let state={
  branches: saved?.branches||BRANCHES,
  orders:   saved?.orders||{},
  thresh:   saved?.thresh||Object.fromEntries(Object.keys(ROUTES).map(k=>[k,3])),
  tab:"orders",
  search:"",
  filterChain:"all",
  collapsed:{},
  editMode:null,
  form:{chain:"",city:"",address:"",route:"tel_aviv_gush",lat:"",lng:""},
  mgmtSearch:"",
  formErr:"",
  flashMsg:"",
};

function getQty(id){return state.orders[id]?.qty||0;}
function getDate(id){return state.orders[id]?.date||null;}
function setOrder(id,qty,date){
  if(qty<=0){delete state.orders[id];}
  else{state.orders[id]={qty,date:date||state.orders[id]?.date||todayStr()};}
  persist();render();
}
function persist(){saveState({branches:state.branches,orders:state.orders,thresh:state.thresh});}

// ── Render engine ──────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(buildApp());
}

function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return e;
}

function span(txt,style){return el("span",{style},txt);}
function div(style,...ch){return el("div",{style},...ch);}
function btn(label,onClick,style){const b=el("button",{onClick,style});b.innerHTML=label;return b;}

// ── Computed ───────────────────────────────
function getRouteStats(){
  const dow=todayDow(),s={};
  Object.keys(ROUTES).forEach(rk=>{
    const br=state.branches.filter(b=>b.route===rk);
    const active=br.filter(b=>getQty(b.id)>0);
    const pallets=active.reduce((a,b)=>a+getQty(b.id),0);
    const thr=state.thresh[rk]||3;
    const urgent=active.filter(b=>daysSince(getDate(b.id))>=thr);
    const oldest=active.length?Math.max(...active.map(b=>daysSince(getDate(b.id)))):0;
    const avoided=ROUTES[rk].avoidDays.includes(dow);
    s[rk]={br,active,pallets,urgent,oldest,avoided};
  });
  return s;
}

// urgency: 0=ok 1=warn 2=urgent
const UB=[
  {bg:"#F0FDF4",border:"#86EFAC",text:"#15803D"},
  {bg:"#FFFBEB",border:"#FCD34D",text:"#B45309"},
  {bg:"#FEF2F2",border:"#FCA5A5",text:"#B91C1C"},
];
function urgLevel(days,thr){if(!days)return 0;const r=days/thr;if(r>=1)return 2;if(r>=0.67)return 1;return 0;}

      rd.appendChild(rs);fg.appendChild(rd);

      fm.appendChild(fg);
      if(state.formErr)fm.appendChild(div({marginTop:"10px",color:"#DC2626",fontSize:"12px",fontWeight:"600"},`⚠️ ${state.formErr}`));

      const fbts=div({display:"flex",gap:"8px",marginTop:"14px",justifyContent:"flex-end"});
      fbts.appendChild(btn("ביטול",()=>{state.editMode=null;state.formErr="";render();},
        {padding:"9px 18px",background:"#F1F5F9",border:"1.5px solid #E2E8F0",borderRadius:"8px",color:"#64748B",cursor:"pointer",fontSize:"13px"}));
      fbts.appendChild(btn(state.editMode==="new"?"➕ הוסף":"💾 שמור",()=>{
        if(!state.form.chain.trim()){state.formErr="חובה: שם רשת";render();return;}
        if(!state.form.city.trim()){state.formErr="חובה: שם עיר";render();return;}
        if(state.editMode==="new"){
          const newId=Math.max(...state.branches.map(b=>b.id))+1;
          state.branches.push({id:newId,chain:state.form.chain.trim(),city:state.form.city.trim(),
            address:state.form.address.trim(),route:state.form.route,lat:31.8,lng:34.8});
        } else {
          const idx=state.branches.findIndex(b=>b.id===state.editMode);
          if(idx>=0)Object.assign(state.branches[idx],{chain:state.form.chain.trim(),city:state.form.city.trim(),
            address:state.form.address.trim(),route:state.form.route});
        }
        persist();state.editMode=null;state.formErr="";
        state.flashMsg="✓ נשמר";setTimeout(()=>{state.flashMsg="";render();},2000);render();
      },{padding:"9px 20px",background:"#1D4ED8",border:"none",borderRadius:"8px",color:"#fff",cursor:"pointer",fontSize:"13px",fontWeight:"700"}));
      fm.appendChild(fbts);body.appendChild(fm);
    }

    // Search + add
    const sb2=div({display:"flex",gap:"8px",marginBottom:"12px",alignItems:"center"});
    const sw=div({flex:"1",position:"relative"});
    sw.appendChild(span("🔍",{position:"absolute",right:"10px",top:"50%",transform:"translateY(-50%)",color:"#94A3B8"}));
    const mi=el("input",{type:"text",placeholder:"חיפוש סניף...",value:state.mgmtSearch,
      onInput:e=>{state.mgmtSearch=e.target.value;render();},
      style:{width:"100%",padding:"9px 32px 9px 10px",border:"1.5px solid #E2E8F0",borderRadius:"9px",fontSize:"13px",outline:"none",background:"#fff"}});
    sw.appendChild(mi);sb2.appendChild(sw);
    const mgmtFiltered=state.branches.filter(b=>!state.mgmtSearch||b.city.includes(state.mgmtSearch)||b.chain.includes(state.mgmtSearch)||b.address.includes(state.mgmtSearch));
    sb2.appendChild(span(`${mgmtFiltered.length}/${state.branches.length}`,{fontSize:"12px",color:"#94A3B8",whiteSpace:"nowrap"}));
    if(state.editMode===null){
      sb2.appendChild(btn("➕ הוסף",()=>{
        state.editMode="new";
        state.form={chain:"",city:"",address:"",route:"tel_aviv_gush",lat:"",lng:""};
        state.formErr="";render();
      },{padding:"9px 16px",background:"#1D4ED8",border:"none",borderRadius:"9px",color:"#fff",cursor:"pointer",fontSize:"13px",fontWeight:"700",whiteSpace:"nowrap"}));
    }
    body.appendChild(sb2);

    // Branch table
    const bt=div({background:"#fff",border:"1.5px solid #E2E8F0",borderRadius:"12px",overflow:"hidden"});
    mgmtFiltered.forEach((b,idx)=>{
      const clr=CHAIN_COLORS[b.chain]||"#64748B";
      const route=ROUTES[b.route];
      const isEd=state.editMode===b.id;
      const row=div({display:"flex",alignItems:"center",gap:"9px",padding:"9px 14px",
        borderBottom:idx<mgmtFiltered.length-1?"1px solid #F1F5F9":"none",
        background:isEd?"#EFF6FF":"#fff",cursor:"default"});
      row.appendChild(span(b.chain,{display:"inline-block",padding:"2px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:"700",
        background:clr+"18",color:clr,border:`1px solid ${clr}30`,whiteSpace:"nowrap",flexShrink:"0"}));
      const info=div({flex:"1",minWidth:"0"});
      info.appendChild(div({fontWeight:"600",fontSize:"13px",color:"#1E293B"},b.city));
      info.appendChild(div({fontSize:"11px",color:"#94A3B8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"},b.address));
      row.appendChild(info);
      if(route)row.appendChild(span(`${route.emoji} ${route.short}`,{fontSize:"11px",fontWeight:"600",
        background:route.color+"12",color:route.color,border:`1px solid ${route.color}30`,
        padding:"2px 7px",borderRadius:"5px",whiteSpace:"nowrap"}));
      const actions=div({display:"flex",gap:"5px",flexShrink:"0"});
      actions.appendChild(btn("✏️",()=>{
        state.editMode=b.id;
        state.form={chain:b.chain,city:b.city,address:b.address,route:b.route,lat:String(b.lat),lng:String(b.lng)};
        state.formErr="";render();
      },{padding:"5px 10px",background:isEd?"#BFDBFE":"#F1F5F9",border:`1.5px solid ${isEd?"#93C5FD":"#E2E8F0"}`,
        borderRadius:"7px",color:isEd?"#1D4ED8":"#64748B",cursor:"pointer",fontSize:"13px"}));
      actions.appendChild(btn("🗑",()=>{
        if(!confirm("למחוק?"))return;
        state.branches=state.branches.filter(x=>x.id!==b.id);
        delete state.orders[b.id];persist();render();
      },{padding:"5px 10px",background:"#FEF2F2",border:"1.5px solid #FCA5A5",borderRadius:"7px",color:"#DC2626",cursor:"pointer",fontSize:"13px"}));
      row.appendChild(actions);bt.appendChild(row);
    });
    body.appendChild(bt);
  }

  // Copyright footer
  const foot=div({textAlign:"center",padding:"14px",marginTop:"8px",fontSize:"11px",color:"#94A3B8",borderTop:"1px solid #F1F5F9"});
  foot.innerHTML=`© ${new Date().getFullYear()} כל הזכויות שמורות לסטס זולין &nbsp;·&nbsp; <strong>Gada Group</strong>`;
  body.appendChild(foot);
  wrap.appendChild(body);
  return wrap;
}

function buildTruckBar(parent,pallets,color){
  const full=Math.floor(pallets/TRUCK_CAP),rem=pallets%TRUCK_CAP,trips=full+(rem?1:0);
  const pct=Math.round((pallets/(trips*TRUCK_CAP))*100);
  const trucks=div({display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"5px"});
  for(let i=0;i<full;i++)trucks.appendChild(span("🚛 10/10",{background:color+"15",border:`1.5px solid ${color}`,borderRadius:"6px",padding:"3px 9px",fontSize:"11px",color,fontWeight:"700"}));
  if(rem>0)trucks.appendChild(span(`🚛 ${rem}/10`,{background:"#FFFBEB",border:"1.5px solid #FCD34D",borderRadius:"6px",padding:"3px 9px",fontSize:"11px",color:"#B45309",fontWeight:"700"}));
  parent.appendChild(trucks);
  const bar=div({height:"5px",background:"#F1F5F9",borderRadius:"3px",overflow:"hidden"});
  const fill=div({height:"100%",width:`${Math.min(100,pct)}%`,background:color,borderRadius:"3px"});
  bar.appendChild(fill);parent.appendChild(bar);
  parent.appendChild(div({fontSize:"10px",color:"#94A3B8",marginTop:"3px"},`${pallets} משטחים · ${trips} יציאות · ${pct}% ניצולת`));
}

// Boot
document.addEventListener("DOMContentLoaded",()=>{
  render();
  document.getElementById("loading").style.display="none";
});

// iOS install banner
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.matchMedia('(display-mode:standalone)').matches){
  setTimeout(()=>document.getElementById('ib').classList.add('show'),3000);
}
// Android install prompt
let dp;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();dp=e;
  const b=document.createElement('button');
  b.textContent='📲 הוסף למסך הבית';
  b.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1E40AF;color:#fff;border:none;padding:11px 22px;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(30,64,175,.4);z-index:200;font-family:inherit;';
  b.onclick=()=>{dp.prompt();b.remove();};
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),9000);
});
</script>
